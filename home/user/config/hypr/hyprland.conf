monitor = DP-5, 1920x1080@60, 0x0, 1
monitor = eDP-1, 1920x1080@60, -1920x0, 1

$terminal = kitty
$fileManager = nemo
$menu = wofi --show drun -IibnO
$systemMonitor = kitty btop
$mainMod = SUPER

env = LIBVA_DRIVER_NAME,nvidia
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = __VK_LAYER_NV_optimus,NVIDIA_only
env = ENABLE_VKBASALT,1
env = GDK_BACKEND,wayland,x11
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_SCALE_FACTOR_ROUNDING_POLICY,RoundPreferFloor
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XCURSOR_THEME,Bibata-Modern-Classic
env = XCURSOR_SIZE,24

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --all
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets,ssh
exec-once = swaync
exec-once = waybar
exec-once = hyprpaper
exec-once = hyprctl dispatch workspace 3
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = hyprctl setcursor Bibata-Modern-Classic 24

general {
   gaps_in = 5
   gaps_out = 20
   border_size = 2
   resize_on_border = true
   allow_tearing = false
   layout = dwindle
}

decoration {
   rounding = 14
   blur {
      enabled = true
      size = 6
      passes = 2
      popups = true
      special = true
   }
}

shadow {
   enabled = false
   range = 4
   render_power = 3
   color = rgba(1a1a1aee)
}

animations {
   enabled = yes
   bezier = easeOutQuint,0.23,1,0.32,1
   bezier = almostLinear,0.5,0.5,0.75,1.0
   bezier = quick,0.15,0,0.1,1
   animation = global, 1, 10, default
   animation = border, 1, 5.39, easeOutQuint
   animation = windows, 1, 4.79, easeOutQuint
   animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
   animation = windowsOut, 1, 1.49, linear, popin 87%
   animation = fadeIn, 1, 1.73, almostLinear
   animation = fadeOut, 1, 1.46, almostLinear
   animation = fade, 1, 3.03, quick
   animation = layers, 1, 3.81, easeOutQuint
   animation = workspaces, 1, 1.94, almostLinear, fade
}

misc {
   force_default_wallpaper = 0
   disable_hyprland_logo = true
   disable_splash_rendering = true
   on_focus_under_fullscreen = 0
}

bind = $mainMod, Return, exec, $terminal
bind = $mainMod+SHIFT, Q, killactive
bind = $mainMod+SHIFT, E, exec, ~/.config/hypr/scripts/logout_dialog.sh
bind = $mainMod+SHIFT+ALT, E, exec, hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod+SHIFT, S, exec, $systemMonitor
bind = $mainMod+SHIFT, Space, togglefloating
bind = $mainMod, S, exec, hyprshot --mode output -o ~/Pictures/Screenshots
bind = $mainMod+ALT, S, exec, hyprshot --mode region -o ~/Pictures/Screenshots
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, togglesplit
bind = SUPER, L, exec, env __NV_PRIME_RENDER_OFFLOAD=0 hyprlock

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

windowrule = fullscreen on, match:class ^(steam_app_.)$
windowrule = stay_focused on, match:class ^(steam_app_223470)$
windowrule = float on, match:class ^(kcm_about-distro)$
windowrule = suppress_event maximize, match:class .
windowrule = no_focus on, match:xwayland true, match:float on
windowrule = opacity 0.6 0.6, match:class .*

layerrule = blur on, match:namespace waybar

plugin {
   dynamic-cursors {
      enabled = true
      mode = tilt
      threshold = 0
      tilt {
         limit = 5000
      }
      shake {
         enabled = false
      }
   }
}
